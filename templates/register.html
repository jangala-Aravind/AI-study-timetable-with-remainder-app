{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div style="min-height:calc(100vh - 64px); display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, var(--orange-pale) 0%, var(--white) 60%, var(--orange-pale) 100%); padding:2rem;">
 <div style="background:var(--white); border:1.5px solid var(--border); border-radius:20px; padding:2.5rem 2rem; width:100%; max-width:440px; box-shadow:var(--shadow-lg);">
 <div style="text-align:center; margin-bottom:2rem;">
 <div style="font-size:2.5rem; margin-bottom:0.5rem;"></div>
 <h2 style="font-weight:700; color:var(--orange); margin:0;">Create Account</h2>
 <p style="color:var(--text-muted); font-size:0.875rem; margin:0.3rem 0 0;">Start studying smarter today</p>
 </div>

 <form method="POST" action="{{ url_for('register') }}">
 <div class="mb-3">
 <label class="form-label">Username</label>
 <input type="text" name="username" class="form-control" placeholder="your_name" required>
 </div>
 <div class="mb-3">
 <label class="form-label">Email Address</label>
 <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
 </div>
 <div class="mb-4">
 <label class="form-label">Password</label>
 <input type="password" name="password" class="form-control" placeholder="Create a password" required>
 </div>
 <button type="submit" class="btn btn-primary w-100" style="padding:0.7rem;">Create Account</button>
 </form>

 <p style="text-align:center; margin-top:1.5rem; font-size:0.875rem; color:var(--text-muted);">
 Already have an account?
 <a href="{{ url_for('login') }}" style="color:var(--orange); font-weight:600;">Sign In</a>
 </p>
 </div>
</div>
{% endblock %}
