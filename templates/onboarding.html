{% extends "base.html" %}
{% block title %}Setup Your Plan{% endblock %}

{% block content %}
<div class="container py-4" style="max-width:700px;">
 <div style="text-align:center; margin-bottom:2.5rem;">
 <div style="font-size:3rem; margin-bottom:0.5rem;"></div>
 <h2 style="font-weight:700; color:var(--text);">Set Up Your Study Plan</h2>
 <p style="color:var(--text-muted); max-width:460px; margin:0.5rem auto 0;">Tell us your subjects and exam dates. Our AI will build your perfect timetable instantly.</p>
 </div>

 <div class="card">
 <div class="card-header"> Your Subjects & Schedule</div>
 <div class="card-body" style="padding:1.5rem;">
 <form method="POST" action="{{ url_for('onboarding') }}">

 <div class="mb-4 p-3" style="background:var(--orange-pale); border-radius:var(--radius-sm); border:1px solid var(--border);">
 <label class="form-label">⏱ Daily Study Hours</label>
 <input type="number" name="daily_hours" class="form-control" placeholder="e.g. 4" min="0.5" max="16" step="0.5" required>
 <small style="color:var(--text-muted); font-size:0.8rem;">How many hours can you study per day?</small>
 </div>

 <div id="subjects-container">
 <div class="subject-row mb-3 p-3" style="border:1.5px solid var(--border-light); border-radius:var(--radius-sm); background:var(--white);">
 <div class="row g-2">
 <div class="col-md-6">
 <label class="form-label">Subject Name</label>
 <input type="text" name="subject_name[]" class="form-control" placeholder="e.g. Mathematics" required>
 </div>
 <div class="col-md-6">
 <label class="form-label">Exam Date</label>
 <input type="date" name="exam_date[]" class="form-control" required>
 </div>
 <div class="col-md-6">
 <label class="form-label">Credit Hours</label>
 <input type="number" name="credit_hours[]" class="form-control" placeholder="e.g. 3" min="1" max="10" step="0.5" required>
 </div>
 <div class="col-md-6">
 <label class="form-label">Difficulty</label>
 <select name="difficulty[]" class="form-select" required>
 <option value="" disabled selected>Select…</option>
 <option value="Hard"> Hard</option>
 <option value="Medium"> Medium</option>
 <option value="Weak"> Weak / Easy</option>
 </select>
 </div>
 </div>
 </div>
 </div>

 <button type="button" onclick="addSubjectRow()" class="btn btn-outline-primary btn-sm mb-4">
 Add Another Subject
 </button>

 <button type="submit" class="btn btn-primary w-100" style="padding:0.75rem; font-size:1rem;">
 Generate My AI Timetable
 </button>
 </form>
 </div>
 </div>
</div>

<script>
function addSubjectRow() {
 const container = document.getElementById('subjects-container');
 const row = document.createElement('div');
 row.className = 'subject-row mb-3 p-3';
 row.style.cssText = 'border:1.5px solid var(--border-light); border-radius:var(--radius-sm); background:var(--white); position:relative;';
 row.innerHTML = `
 <button type="button" onclick="this.parentElement.remove()"
 style="position:absolute; top:0.5rem; right:0.5rem; background:var(--danger-bg); color:var(--danger); border:none; border-radius:6px; padding:0.15rem 0.5rem; font-size:0.8rem; cursor:pointer;"></button>
 <div class="row g-2">
 <div class="col-md-6">
 <label class="form-label">Subject Name</label>
 <input type="text" name="subject_name[]" class="form-control" placeholder="e.g. Physics">
 </div>
 <div class="col-md-6">
 <label class="form-label">Exam Date</label>
 <input type="date" name="exam_date[]" class="form-control">
 </div>
 <div class="col-md-6">
 <label class="form-label">Credit Hours</label>
 <input type="number" name="credit_hours[]" class="form-control" placeholder="e.g. 3" min="1" max="10" step="0.5">
 </div>
 <div class="col-md-6">
 <label class="form-label">Difficulty</label>
 <select name="difficulty[]" class="form-select">
 <option value="" disabled selected>Select…</option>
 <option value="Hard"> Hard</option>
 <option value="Medium"> Medium</option>
 <option value="Weak"> Weak / Easy</option>
 </select>
 </div>
 </div>`;
 container.appendChild(row);
}
</script>
{% endblock %}
